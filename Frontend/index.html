<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />

    <!-- ══════════════════════════════════════════════
         PWA — META ESSENTIELS
    ══════════════════════════════════════════════ -->

    <!-- Viewport mobile optimisé (interdit le zoom involontaire) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Titre & description -->
    <title>Bibliothèque Scolaire</title>
    <meta name="description" content="Gestion des emprunts de livres scolaires" />

    <!-- Theme color (barre de statut Android/Chrome) -->
    <meta name="theme-color" content="#6366f1" />

    <!-- ══════════════════════════════════════════════
         ANDROID / CHROME
    ══════════════════════════════════════════════ -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- ══════════════════════════════════════════════
         APPLE / iOS (Safari)
    ══════════════════════════════════════════════ -->
    <!-- Permet "Ajouter à l'écran d'accueil" sans barre Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Biblio" />

    <!-- Icônes iOS (Apple ne lit pas le manifest pour ça) -->
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

    <!-- Splash screen iOS (optionnel mais pro) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- Favicon standard -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
